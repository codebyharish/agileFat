apiVersion: apps/v1
kind: Deployment
metadata:
  name: expense-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: expense-app
  template:
    metadata:
      labels:
        app: expense-app
    spec:
      containers:
      - name: expense-app
        image: harish0805/expense-tracker-app:latest
        ports:
        - containerPort: 8080

---
apiVersion: v1
kind: Service
metadata:
  name: expense-service
spec:
  type: NodePort
  selector:
    app: expense-app
  ports:
    - port: 80
      targetPort: 8080
      nodePort: 30009